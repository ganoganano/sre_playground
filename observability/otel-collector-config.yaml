receivers:
  otlp:
    protocols:
      http:
      grpc:

processors:
  batch:

exporters:
  debug:
    verbosity: normal
  otlp/tempo:
    endpoint: ${TEMPO_OTLP_ENDPOINT}
    tls:
      insecure: true
  prometheusremotewrite:
    endpoint: ${PROMETHEUS_REMOTE_WRITE_ENDPOINT}
  loki:
    endpoint: ${LOKI_ENDPOINT}

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [debug, otlp/tempo]
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [prometheusremotewrite]
    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [loki]
